<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bangla QR Card - ডিজিটাল কার্ড বানান</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    body { font-family: 'Noto Sans Bengali', system-ui, sans-serif; }
    .card { border: 2px solid #10b981; border-radius: 16px; }
  </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen py-8">
  <div class="max-w-4xl mx-auto px-4">
    <h1 class="text-4xl font-bold text-center text-emerald-700 mb-2">বাংলা QR কার্ড</h1>
    <p class="text-center text-gray-600 mb-8">আপনার ডিজিটাল ভিজিটিং কার্ড + QR কোড বানান ফ্রিতে</p>

    <div class="grid md:grid-cols-2 gap-8">
      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <form id="cardForm">
          <div class="space-y-4">
            <input type="text" id="name" placeholder="আপনার নাম" class="w-full p-3 border rounded-xl" required>
            <input type="text" id="profession" placeholder="পেশা (যেমন: ফ্রিল্যান্সার)" class="w-full p-3 border rounded-xl">
            <input type="tel" id="phone" placeholder="মোবাইল নাম্বার" class="w-full p-3 border rounded-xl" required>
            <input type="email" id="email" placeholder="ইমেইল" class="w-full p-3 border rounded-xl">
            <input type="text" id="address" placeholder="ঠিকানা" class="w-full p-3 border rounded-xl">
            <input type="url" id="whatsapp" placeholder="WhatsApp লিংক (ঐচ্ছিক)" class="w-full p-3 border rounded-xl">
            
            <button type="button" onclick="generateCard()" 
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-semibold text-lg">
              কার্ড + QR বানান
            </button>
          </div>
        </form>
      </div>

      <div>
        <div id="preview" class="card bg-white p-6 shadow-xl min-h-[380px] flex flex-col items-center justify-center text-center">
          <p class="text-gray-400">ফর্ম পূরণ করে "কার্ড বানান" চাপুন</p>
        </div>
        
        <div class="mt-6 flex gap-4">
          <button onclick="downloadPDF()" id="downloadBtn" 
            class="flex-1 bg-emerald-600 text-white py-3 rounded-2xl font-medium hidden">
            PDF ডাউনলোড করুন
          </button>
          <button onclick="shareCard()" id="shareBtn"
            class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-medium hidden">
            শেয়ার করুন
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function generateCard() {
      const name = document.getElementById('name').value || "আপনার নাম";
      const profession = document.getElementById('profession').value || "পেশা";
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const address = document.getElementById('address').value;
      const whatsapp = document.getElementById('whatsapp').value;

      let vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:\( {name}\nORG: \){profession}\nTEL:\( {phone}\nEMAIL: \){email}\nADR:${address}\nEND:VCARD`;

      const preview = document.getElementById('preview');
      preview.innerHTML = `
        <div class="w-full max-w-[320px] bg-white border-2 border-emerald-500 rounded-3xl p-6 shadow-md text-center">
          <div class="text-2xl font-bold text-emerald-700 mb-1">${name}</div>
          <div class="text-emerald-600 font-medium">${profession}</div>
          <div class="my-6 flex justify-center" id="qrdiv"></div>
          <div class="space-y-2 text-sm">
            <div>📞 ${phone}</div>
            ${email ? `<div>✉️ ${email}</div>` : ''}
            ${address ? `<div>📍 ${address}</div>` : ''}
          </div>
        </div>
      `;

      setTimeout(() => {
        QRCode.toCanvas(document.createElement('canvas'), vcard, { width: 180 }, function (error, canvas) {
          if (error) console.error(error);
          document.getElementById('qrdiv').appendChild(canvas);
        });
      }, 100);

      document.getElementById('downloadBtn').classList.remove('hidden');
      document.getElementById('shareBtn').classList.remove('hidden');
    }

    function downloadPDF() {
      const element = document.getElementById('preview');
      html2pdf().from(element).save('My-Digital-Card.pdf');
    }

    function shareCard() {
      alert("✅ লিংক কপি হয়েছে! (পরে শর্ট লিংক যোগ করা যাবে)");
    }
  </script>
</body>
              </html>
